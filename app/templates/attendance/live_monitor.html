{% extends "base.html" %}

{% block title %}{{ t('live_monitor_title') }}{% endblock %}

{% block content %}
<div class="space-y-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">{{ t('live_monitor_title') }}</h1>
        <p class="text-gray-500 mt-1">{{ t('live_monitor_description') }}</p>
    </div>

    <div id="live-events" class="space-y-2 max-h-[70vh] overflow-y-auto">
        <p id="live-empty" class="text-gray-500 py-4">{{ t('live_monitor_waiting') }}</p>
    </div>
</div>

<script>
(function() {
    const eventsEl = document.getElementById('live-events');
    const emptyEl = document.getElementById('live-empty');
    const logsUrl = "{{ url_for('face_api.logs') }}?limit=20";
    let lastId = 0;
    const seenIds = new Set();

    function addEvent(log) {
        if (emptyEl) emptyEl.style.display = 'none';
        if (seenIds.has(log.id)) return;
        seenIds.add(log.id);
        const div = document.createElement('div');
        div.className = 'p-4 rounded-xl border shadow-sm animate-pulse-once bg-blue-100 border-blue-300';
        const name = (log.person_name || '-').toUpperCase();
        const status = "{{ t('student_arrived') }}";
        const time = log.event_time ? String(log.event_time).replace('T',' ').slice(0,19) : '';
        div.innerHTML = '<div class="font-semibold text-gray-900">' + name + '</div>' +
            '<div class="text-sm text-gray-600">' + status + (time ? ' - ' + time : '') + '</div>';
        eventsEl.insertBefore(div, eventsEl.firstChild);
        setTimeout(function() { div.classList.remove('animate-pulse-once'); }, 500);
    }

    function fetchLogs() {
        fetch(logsUrl, { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success' && data.logs && data.logs.length > 0) {
                    if (emptyEl) emptyEl.textContent = "{{ t('live_monitor_connected') }}";
                    data.logs.forEach(function(log) {
                        if (log.id > lastId) addEvent(log);
                        if (log.id > lastId) lastId = log.id;
                    });
                }
            })
            .catch(function() {});
    }

    setInterval(fetchLogs, 3000);
    setTimeout(fetchLogs, 500);
})();
</script>
<style>
@keyframes pulse-once { 0%{opacity:0.5} 100%{opacity:1} }
.animate-pulse-once { animation: pulse-once 0.5s ease-out; }
</style>
{% endblock %}
