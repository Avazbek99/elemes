{% extends "base.html" %}

{% block title %}Guruhni tahrirlash{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('admin.faculty_detail', id=group.faculty_id) }}" class="text-gray-500 hover:text-gray-700 flex items-center gap-2 mb-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Orqaga
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Guruhni tahrirlash</h1>
        <p class="text-gray-500">{{ group.name }}</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Guruh nomi</label>
                <input type="text" name="name" value="{{ group.name }}" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent uppercase">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Fakultet</label>
                <select name="faculty_id" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    {% for faculty in faculties %}
                    <option value="{{ faculty.id }}" {% if group.faculty_id==faculty.id %}selected{% endif %}>{{
                        faculty.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Yo'nalish</label>
                <select name="direction_id"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    <option value="">Tanlang...</option>
                    {% for direction in directions %}
                    <option value="{{ direction.id }}" {% if group.direction_id==direction.id %}selected{% endif %}>{{
                        direction.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Kurs</label>
                    <input type="number" name="course_year" min="1" max="4" value="{{ group.course_year }}" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Ta'lim turi</label>
                    <select name="education_type"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        <option value="kunduzgi" {% if group.education_type=='kunduzgi' %}selected{% endif %}>Kunduzgi
                        </option>
                        <option value="sirtqi" {% if group.education_type=='sirtqi' %}selected{% endif %}>Sirtqi
                        </option>
                        <option value="kechki" {% if group.education_type=='kechki' %}selected{% endif %}>Kechki
                        </option>
                    </select>
                </div>
            </div>

            <div class="pt-4 border-t border-gray-100 flex gap-3">
                <button type="submit"
                    class="flex-1 px-4 py-3 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors font-medium">
                    Yangilash
                </button>
                <a href="{{ url_for('admin.faculty_detail', id=group.faculty_id) }}" 
                   class="px-4 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-medium">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
