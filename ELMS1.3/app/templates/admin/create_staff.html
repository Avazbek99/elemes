{% extends "base.html" %}

{% block title %}Yangi xodim{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('admin.staff') }}" class="text-gray-500 hover:text-gray-700 flex items-center gap-2 mb-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Orqaga
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Yangi xodim yaratish</h1>
    </div>
    
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <!-- To'liq ism -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">To'liq ism *</label>
                <input type="text" name="full_name" required placeholder="Ism Familiya"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            
            <!-- Login -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Login *</label>
                <input type="text" name="login" required placeholder="a_tursunqulov"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                <p class="text-xs text-gray-500 mt-1">Tizimga kirish uchun login</p>
            </div>
            
            <!-- Pasport ma'lumotlari -->
            <div class="space-y-4">
                <h3 class="text-lg font-semibold text-gray-900 border-b border-gray-100 pb-2">Pasport ma'lumotlari</h3>
                
                <!-- Pasport seriyasi va raqami -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Pasport seriyasi va raqami *</label>
                    <input type="text" name="passport_number" required placeholder="AB1234567" style="text-transform: uppercase;"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    <p class="text-xs text-gray-500 mt-1">Bu parol sifatida ishlatiladi</p>
                </div>
                
                <!-- JSHSHIR (PINFL) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">JSHSHIR (PINFL)</label>
                    <input type="text" name="pinfl" placeholder="30202020200021" maxlength="14"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
                
                <!-- Tug'ilgan sana -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Tug'ilgan sana</label>
                    <input type="text" name="birth_date" placeholder="yyyy-mm-dd (masalan: 1999-02-06)"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                </div>
            </div>
            
            <!-- Telefon -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Telefon</label>
                <input type="text" name="phone" placeholder="+998 90 123 45 67"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            
            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                <input type="email" name="email" placeholder="email@university.uz"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            
            <!-- Tavsif -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Tavsif</label>
                <textarea name="description" rows="3" placeholder="Xodim haqida qisqacha ma'lumot..."
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent resize-none"></textarea>
            </div>
            
            <!-- Rollar -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Rollar *</label>
                <p class="text-xs text-gray-500 mb-2">Bir nechta rol tanlash mumkin</p>
                <div class="space-y-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="roles" value="admin" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <span class="text-sm text-gray-700">Administrator</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="roles" value="dean" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <span class="text-sm text-gray-700">Dekan</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="roles" value="teacher" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <span class="text-sm text-gray-700">O'qituvchi</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="roles" value="accounting" class="w-4 h-4 text-primary-600 border-gray-300 rounded focus:ring-primary-500">
                        <span class="text-sm text-gray-700">Buxgalter</span>
                    </label>
                </div>
            </div>
            
            <div class="pt-4 border-t border-gray-100 flex gap-3">
                <button type="submit" class="flex-1 px-4 py-3 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors font-medium">
                    Xodim yaratish
                </button>
                <a href="{{ url_for('admin.staff') }}" class="px-4 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-medium">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
