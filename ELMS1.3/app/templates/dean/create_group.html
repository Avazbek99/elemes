{% extends "base.html" %}

{% block title %}Yangi guruh{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('dean.courses') }}" class="text-gray-500 hover:text-gray-700 flex items-center gap-2 mb-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Orqaga
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Yangi guruh</h1>
        <p class="text-gray-500 mt-1">{{ faculty.name }} fakulteti</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Fakultet</label>
                <input type="text" value="{{ faculty.name }}" disabled
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 text-gray-600">
                <p class="text-xs text-gray-500 mt-1">Fakultet avtomatik tanlangan</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Yo'nalish *</label>
                <select name="direction_id" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    <option value="">Tanlang...</option>
                    {% for direction in directions %}
                    <option value="{{ direction.id }}" 
                            data-education-type="{{ direction.education_type }}"
                            {% if default_direction_id == direction.id %}selected{% endif %}>
                        {{ direction.code }} - {{ direction.name }} ({{ direction.course_year }}-kurs, {{ direction.semester }}-semestr)
                    </option>
                    {% endfor %}
                </select>
                <p class="text-xs text-gray-500 mt-1">Shu fakultetda yaratilgan yo'nalishlar</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Guruh nomi *</label>
                <input type="text" name="name" required placeholder="Masalan: DI-21"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent uppercase">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Ta'lim shakli</label>
                <input type="text" id="educationTypeDisplay" value="Yo'nalish tanlangandan keyin ko'rsatiladi" disabled
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 text-gray-600">
                <p class="text-xs text-gray-500 mt-1">Ta'lim shakli yo'nalishdan avtomatik olinadi</p>
            </div>

            <div class="pt-4 border-t border-gray-100 flex gap-3">
                <button type="submit"
                    class="flex-1 px-4 py-3 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors font-medium">
                    Saqlash
                </button>
                <a href="{{ url_for('dean.courses') }}" 
                   class="px-4 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-medium">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>

<script>
// Yo'nalish tanlanganda ta'lim shaklini ko'rsatish
document.querySelector('select[name="direction_id"]').addEventListener('change', function() {
    const directionId = this.value;
    const educationTypeDisplay = document.getElementById('educationTypeDisplay');
    
    if (directionId) {
        const selectedOption = this.options[this.selectedIndex];
        const educationType = selectedOption.getAttribute('data-education-type');
        
        // Ta'lim shakli nomlarini o'zbek tiliga o'girish
        const educationTypeNames = {
            'kunduzgi': 'Kunduzgi',
            'sirtqi': 'Sirtqi',
            'masofaviy': 'Masofaviy',
            'kechki': 'Kechki'
        };
        
        if (educationType && educationTypeNames[educationType]) {
            educationTypeDisplay.value = educationTypeNames[educationType] + ' (yo\'nalishdan olinadi)';
        } else {
            educationTypeDisplay.value = 'Yo\'nalishdan avtomatik olinadi';
        }
    } else {
        educationTypeDisplay.value = 'Yo\'nalish tanlangandan keyin ko\'rsatiladi';
    }
});

// Sahifa yuklanganda, agar yo'nalish tanlangan bo'lsa, ta'lim shaklini ko'rsatish
document.addEventListener('DOMContentLoaded', function() {
    const directionSelect = document.querySelector('select[name="direction_id"]');
    if (directionSelect.value) {
        directionSelect.dispatchEvent(new Event('change'));
    }
});
</script>
{% endblock %}
