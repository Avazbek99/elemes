{% extends "base.html" %}

{% block title %}Yo'nalishni tahrirlash{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="{{ url_for('dean.courses') }}" class="text-gray-500 hover:text-gray-700 flex items-center gap-2 mb-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Orqaga
        </a>
        <h1 class="text-2xl font-bold text-gray-900">Yo'nalishni tahrirlash</h1>
        <p class="text-gray-600">{{ direction.name }}</p>
    </div>
    
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Fakultet</label>
                <input type="text" value="{{ direction.faculty.name }}" disabled
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 text-gray-600">
                <p class="text-xs text-gray-500 mt-1">Fakultet o'zgartirib bo'lmaydi</p>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Yo'nalish kodi (mutaxassislik shifri) *</label>
                <input type="text" name="code" required value="{{ direction.code }}" placeholder="DI" maxlength="15"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent uppercase">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Yo'nalish nomi (mutaxassislik nomi) *</label>
                <input type="text" name="name" required value="{{ direction.name }}" placeholder="Dasturiy injiniring"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Kurs *</label>
                    <select name="course_year" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        <option value="1" {% if direction.course_year == 1 %}selected{% endif %}>1-kurs</option>
                        <option value="2" {% if direction.course_year == 2 %}selected{% endif %}>2-kurs</option>
                        <option value="3" {% if direction.course_year == 3 %}selected{% endif %}>3-kurs</option>
                        <option value="4" {% if direction.course_year == 4 %}selected{% endif %}>4-kurs</option>
                        <option value="5" {% if direction.course_year == 5 %}selected{% endif %}>5-kurs</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Semestr *</label>
                    <select name="semester" required
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                        <option value="1" {% if direction.semester == 1 %}selected{% endif %}>1-semestr</option>
                        <option value="2" {% if direction.semester == 2 %}selected{% endif %}>2-semestr</option>
                        <option value="3" {% if direction.semester == 3 %}selected{% endif %}>3-semestr</option>
                        <option value="4" {% if direction.semester == 4 %}selected{% endif %}>4-semestr</option>
                        <option value="5" {% if direction.semester == 5 %}selected{% endif %}>5-semestr</option>
                        <option value="6" {% if direction.semester == 6 %}selected{% endif %}>6-semestr</option>
                        <option value="7" {% if direction.semester == 7 %}selected{% endif %}>7-semestr</option>
                        <option value="8" {% if direction.semester == 8 %}selected{% endif %}>8-semestr</option>
                        <option value="9" {% if direction.semester == 9 %}selected{% endif %}>9-semestr</option>
                        <option value="10" {% if direction.semester == 10 %}selected{% endif %}>10-semestr</option>
                    </select>
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Ta'lim shakli *</label>
                <select name="education_type" required
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">
                    <option value="kunduzgi" {% if direction.education_type == 'kunduzgi' %}selected{% endif %}>Kunduzgi</option>
                    <option value="sirtqi" {% if direction.education_type == 'sirtqi' %}selected{% endif %}>Sirtqi</option>
                    <option value="masofaviy" {% if direction.education_type == 'masofaviy' %}selected{% endif %}>Masofaviy</option>
                    <option value="kechki" {% if direction.education_type == 'kechki' %}selected{% endif %}>Kechki</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Izoh</label>
                <textarea name="description" rows="3" placeholder="Yo'nalish haqida qisqacha izoh"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent">{{ direction.description or '' }}</textarea>
            </div>
            
            <div class="pt-4 border-t border-gray-100 flex gap-3">
                <button type="submit" class="flex-1 px-4 py-3 bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors font-medium">
                    Saqlash
                </button>
                <a href="{{ url_for('dean.courses') }}" class="px-4 py-3 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition-colors font-medium">
                    Bekor qilish
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
